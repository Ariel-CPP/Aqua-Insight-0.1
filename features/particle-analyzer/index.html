<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Analyzer - Aqua Insight</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/particle-counter.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="../index.html">
                    <img src="../images/logo.png" alt="Aqua Insight">
                </a>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Dashboard</a>
                <a href="index.html" class="nav-link active">Particle Analyzer</a>
                <a href="../contact.html" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <div class="particle-analyzer-container">
        <!-- Left Panel - Controls -->
        <div class="left-panel">
            <div class="panel-header">
                <h2><i class="fas fa-microscope"></i> Particle Analyzer</h2>
            </div>

            <!-- Upload Section -->
            <div class="control-section">
                <h3><i class="fas fa-upload"></i> Upload Image</h3>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Drag & drop or click to upload</p>
                    <input type="file" id="imageInput" accept="image/*" multiple>
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- Channel Selection -->
            <div class="control-section">
                <h3><i class="fas fa-palette"></i> Channel Selection</h3>
                <div class="channel-buttons">
                    <button class="channel-btn active" data-channel="rgb">RGB</button>
                    <button class="channel-btn" data-channel="red">Red</button>
                    <button class="channel-btn" data-channel="green">Green</button>
                    <button class="channel-btn" data-channel="blue">Blue</button>
                </div>
            </div>

            <!-- Threshold & Settings -->
            <div class="control-section">
                <h3><i class="fas fa-sliders-h"></i> Analysis Settings</h3>
                <div class="setting-group">
                    <label>Threshold: <span id="thresholdValue">128</span></label>
                    <input type="range" id="thresholdSlider" min="0" max="255" value="128">
                </div>
                <div class="setting-group checkbox-group">
                    <label>
                        <input type="checkbox" id="darkBackground"> Dark Background
                    </label>
                </div>
                <div class="setting-group">
                    <label>Size (px²): <span id="sizeRange">10-∞</span></label>
                    <input type="range" id="sizeMin" min="1" max="10000" value="10">
                    <input type="range" id="sizeMax" min="10" max="100000" value="100000">
                </div>
                <div class="setting-group">
                    <label>Circularity: <span id="circularityRange">0.00-1.00</span></label>
                    <input type="range" id="circularityMin" min="0" max="1" value="0" step="0.01">
                    <input type="range" id="circularityMax" min="0" max="1" value="1" step="0.01">
                </div>
                <button class="analyze-btn" id="analyzeBtn">
                    <i class="fas fa-play"></i> Analyze Particles
                </button>
            </div>
        </div>

        <!-- Right Panel - Canvas & Results -->
        <div class="right-panel">
            <!-- Canvas Area -->
            <div class="canvas-container">
                <div class="canvas-header">
                    <div class="canvas-controls">
                        <button class="control-btn" id="zoomIn"><i class="fas fa-search-plus"></i></button>
                        <button class="control-btn" id="zoomOut"><i class="fas fa-search-minus"></i></button>
                        <button class="control-btn" id="resetView"><i class="fas fa-expand-arrows-alt"></i></button>
                    </div>
                    <div class="canvas-info">
                        <span id="canvasStatus">Ready</span>
                        <span id="particleCount">0 particles</span>
                    </div>
                </div>
                <canvas id="mainCanvas"></canvas>
            </div>

            <!-- Summary -->
            <div class="summary-card" id="summaryCard" style="display: none;">
                <h3><i class="fas fa-chart-bar"></i> Analysis Summary</h3>
                <div class="summary-stats">
                    <div class="stat-item">
                        <span class="stat-label">Total Particles:</span>
                        <span class="stat-value" id="totalParticles">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Area:</span>
                        <span class="stat-value" id="totalArea">0</span> px²
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Coverage:</span>
                        <span class="stat-value" id="coverage">0</span>%
                    </div>
                </div>
