<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Analyzer - Aqua Insight</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            margin-bottom: 20px;
        }
        
        .page-title {
            color: #38bdf8;
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }
        
        .page-subtitle {
            color: #64748b;
            margin: 0;
        }
        
        .upload-box {
            border: 3px dashed #38bdf8;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(56, 189, 248, 0.05);
        }
        
        .upload-box:hover,
        .upload-box.dragover {
            background: rgba(56, 189, 248, 0.15);
            border-color: #22d3ee;
        }
        
        .upload-box input {
            display: none;
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #94a3b8;
            margin: 0;
        }
        
        .canvas-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .canvas-wrapper {
            flex: 1;
            min-width: 600px;
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        
        #mainCanvas {
            display: block;
            width: 100%;
        }
        
        .controls {
            width: 350px;
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
        }
        
        .control-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        
        .control-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .control-label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .control-value {
            float: right;
            color: #38bdf8;
            font-weight: bold;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #334155;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            cursor: pointer;
        }
        
        .channel-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .channel-btn {
            padding: 10px;
            border: 2px solid #334155;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .channel-btn:hover {
            border-color: #38bdf8;
            color: #e2e8f0;
        }
        
        .channel-btn.active {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-color: transparent;
            color: white;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: #38bdf8;
        }
        
        .checkbox-group label {
            color: #94a3b8;
            cursor: pointer;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        }
        
        .btn-secondary {
            background: #334155;
            color: white;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #475569;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .stats-box {
            background: #334155;
            border-radius: 12px;
            padding: 15px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #475569;
        }
        
        .stats-row:last-child {
            border-bottom: none;
        }
        
        .stats-label {
            color: #94a3b8;
        }
        
        .stats-value {
            color: #38bdf8;
            font-weight: bold;
        }
        
        .preview-wrapper {
            margin-top: 15px;
        }
        
        #previewCanvas {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            background: #0f172a;
        }
        
        .preview-label {
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        
        .results-section {
            margin-top: 15px;
        }
        
        .results-title {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .table-wrapper {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        
        .results-table th {
            background: #334155;
            padding: 8px 6px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        
        .results-table td {
            padding: 8px 6px;
            border-bottom: 1px solid #334155;
        }
        
        .results-table tr:hover {
            background: rgba(56, 189, 248, 0.1);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #38bdf8;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: rgba(56, 189, 248, 0.2);
        }
        
        @media (max-width: 992px) {
            .canvas-container {
                flex-direction: column;
            }
            
            .canvas-wrapper,
            .controls {
                width: 100%;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Dashboard</a>
        
        <div class="page-header">
            <h1 class="page-title">🔬 Particle Analyzer</h1>
            <p class="page-subtitle">Deteksi dan analisis partikel dalam gambar dengan threshold</p>
        </div>
        
        <div class="upload-box" id="uploadBox">
            <div class="upload-icon">📤</div>
            <p class="upload-text">Click atau drag & drop gambar untuk upload</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="canvas-container">
            <div class="canvas-wrapper">
                <canvas id="mainCanvas"></canvas>
            </div>
            
            <div class="controls">
                <div class="control-section">
                    <label class="control-label">
                        Channel
                        <span class="control-value" id="channelValue">Red</span>
                    </label>
                    <div class="channel-btns">
                        <button class="channel-btn active" data-channel="red">🔴 Red</button>
                        <button class="channel-btn" data-channel="green">🟢 Green</button>
                        <button class="channel-btn" data-channel="blue">🔵 Blue</button>
                        <button class="channel-btn" data-channel="gray">⚪ Gray</button>
                    </div>
                </div>
                
                <div class="control-section">
                    <label class="control-label">
                        Threshold
                        <span class="control-value" id="thresholdValue">128</span>
                    </label>
                    <input type="range" id="thresholdSlider" min="0" max="255" value="128">
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="invertCheck">
                        <label for="invertCheck">Dark Background</label>
                    </div>
                </div>
                
                <div class="control-section">
                    <label class="control-label">
                        Min Size
                        <span class="control-value" id="minSizeValue">10</span> px²
                    </label>
                    <input type="range" id="minSizeSlider" min="1" max="1000" value="10">
                </div>
                
                <div class="control-section">
                    <label class="control-label">
                        Max Size
                        <span class="control-value" id="maxSizeValue">10000</span> px²
                    </label>
                    <input type="range" id="maxSizeSlider" min="100" max="100000" value="10000">
                </div>
                
                <div class="control-section">
                    <button class="btn btn-primary" id="analyzeBtn" disabled>
                        🔍 Analyze Particles
                    </button>
                    <button class="btn btn-secondary" id="exportCsvBtn" disabled>
                        📄 Export CSV
                    </button>
                    <button class="btn btn-secondary" id="exportPngBtn" disabled>
                        🖼️ Export PNG
                    </button>
                </div>
                
                <div class="control-section">
                    <div class="stats-box" id="statsPanel" style="display: none;">
                        <div class="stats-row">
                            <span class="stats-label">Total Particles</span>
                            <span class="stats-value" id="totalParticles">0</span>
                        </div>
                        <div class="stats-row">
                            <span class="stats-label">Total Area</span>
                            <span class="stats-value" id="totalArea">0 px²</span>
                        </div>
                        <div class="stats-row">
                            <span class="stats-label">Coverage</span>
                            <span class="stats-value" id="coverage">0%</span>
                        </div>
                    </div>
                </div>
                
                <div class="control-section preview-wrapper">
                    <canvas id="previewCanvas"></canvas>
                    <p class="preview-label" id="previewLabel">Original</p>
                </div>
                
                <div class="results-section" id="resultsSection" style="display: none;">
                    <h3 class="results-title">📋 Results</h3>
                    <div class="table-wrapper">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Size</th>
                                    <th>R</th>
                                    <th>G</th>
                                    <th>B</th>
                                    <th>Circ</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="js/particle-analyzer.js"></script>
</body>
</html>
